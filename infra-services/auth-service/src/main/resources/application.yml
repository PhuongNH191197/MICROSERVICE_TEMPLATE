server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:config_admin}:${CONFIG_SERVER_PASSWORD:config_pass}@${CONFIG_SERVER_HOST:config-server}:8888

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin_pass}@${EUREKA_HOST:eureka-server}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
